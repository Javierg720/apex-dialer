global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: apex-local
    env: dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: apex-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend

  - job_name: node
    static_configs:
      - targets: []
        labels:
          service: node
