# Apex Dialer — Postgres 16 tuning (dev-friendly; revisit for prod sizing).

listen_addresses = '*'
max_connections = 200

# Memory
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 128MB

# WAL / durability
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# Planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging
log_min_duration_statement = 250
log_line_prefix = '%m [%p] %q%u@%d '
log_timezone = 'UTC'
log_statement = 'ddl'
log_checkpoints = on
log_lock_waits = on

# Autovacuum
autovacuum = on
autovacuum_naptime = 30s
