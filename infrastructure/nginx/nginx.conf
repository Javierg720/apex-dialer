user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  server_tokens off;

  keepalive_timeout 65;
  client_max_body_size 50m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  upstream backend_upstream {
    server backend:8000;
    keepalive 32;
  }

  upstream dashboard_upstream {
    server dashboard:80;
    keepalive 32;
  }

  server {
    listen 80 default_server;
    server_name _;

    # Strip /api prefix before forwarding.
    location /api/ {
      proxy_pass http://backend_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # WebSocket upgrade path for realtime events.
    location /ws/ {
      proxy_pass http://backend_upstream/ws/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_read_timeout 3600s;
    }

    # Everything else → SPA.
    location / {
      proxy_pass http://dashboard_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
