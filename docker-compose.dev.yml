services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: DEBUG

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      target: dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3001:3000"
